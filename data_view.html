<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データ照会</title>
  <link rel="stylesheet" href="./theme.css">
  <link rel="stylesheet" href="./data_view.css">
</head>
<body>
<div class="page">
  <div class="card">
    <div id="pageToolbar"></div>

    <main class="data-view-main">
      <section class="summary-panel" aria-label="取得状況">
        <div class="summary-item">
          <span class="summary-label">全体</span>
          <strong id="totalCount">0 件</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">親</span>
          <strong id="parentCount">0 件</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">子</span>
          <strong id="childCount">0 件</strong>
        </div>
        <div class="summary-item">
          <span class="summary-label">ファイル</span>
          <strong id="fileCount">0 件</strong>
        </div>
        <div class="summary-item summary-size">
          <span class="summary-label">合計サイズ</span>
          <strong id="totalSize">0 B</strong>
        </div>
        <button id="btnReload" class="btn" type="button" disabled>再読込</button>
      </section>

      <section id="emptyPanel" class="empty-panel">
        データソースを選択してください。
      </section>

      <section id="dataPanel" class="data-panel hidden">
        <div class="source-summary">
          <div>
            <span class="source-summary-label">データソース</span>
            <strong id="dataSourceName">-</strong>
          </div>
          <div>
            <span class="source-summary-label">取得単位</span>
            <span id="batchDisplay">-</span>
          </div>
        </div>

        <div class="lists-grid">
          <section class="list-pane">
            <h2 class="panel-title">親・取得データ</h2>
            <div class="table-wrap">
              <table id="parentTable">
                <thead>
                  <tr>
                    <th class="col-index">No.</th>
                    <th>名称</th>
                    <th class="col-type">種別</th>
                    <th class="col-count">子件数</th>
                    <th class="col-date">取得日時</th>
                  </tr>
                </thead>
                <tbody id="parentTableBody"></tbody>
              </table>
            </div>
          </section>

          <section class="list-pane">
            <h2 class="panel-title">子・ファイル</h2>
            <div class="table-wrap">
              <table id="childTable">
                <thead>
                  <tr>
                    <th class="col-index">No.</th>
                    <th>名称</th>
                    <th class="col-extension">形式</th>
                    <th class="col-size">サイズ</th>
                    <th class="col-action">操作</th>
                  </tr>
                </thead>
                <tbody id="childTableBody"></tbody>
              </table>
            </div>
          </section>
        </div>

        <section class="detail-section">
          <h2 class="panel-title">詳細表示</h2>
          <div class="detail-header">
            <span id="detailTitle">データを選択してください。</span>
            <button id="btnDownload" class="btn btn-primary" type="button" disabled>
              ダウンロード
            </button>
          </div>
          <pre id="detailPre">データを選択してください。</pre>
        </section>
      </section>
    </main>
  </div>
</div>

<script type="module" src="./data_view.js"></script>
</body>
</html>
