<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>一般ユーザー管理 - QA+Plain Knowledge Studio</title>

    <link rel="stylesheet" href="./css/theme.css">
</head>

<body>

<main class="page">

    <div class="page-toolbar">

        <div class="page-toolbar-title">
            一般ユーザー管理
        </div>

        <div class="page-toolbar-main">
        </div>

        <div class="page-toolbar-actions">

            <button
                id="addUserButton"
                type="button"
                class="btn btn-primary">
                新規登録
            </button>

            <button
                id="backButton"
                type="button"
                class="btn">
                戻る
            </button>

        </div>

    </div>

    <section class="card">

        <div class="list-header">

            <div style="width:20%;">
                ユーザー名
            </div>

            <div style="width:28%;">
                メールアドレス
            </div>

            <div style="width:12%;">
                区分
            </div>

            <div style="width:13%;">
                利用開始日
            </div>

            <div style="width:13%;">
                利用終了日
            </div>

            <div style="width:14%;">
                操作
            </div>

        </div>

        <div id="generalUserList">
            <!-- general_user_maintenance.js が一覧を表示 -->
        </div>

    </section>

</main>

<script
    type="module"
    src="./js/general_user_maintenance.js">
</script>

</body>
</html>
