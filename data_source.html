<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        データ取り込み - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">

    <link
        rel="stylesheet"
        href="./css/data_source.css">
</head>

<body>

<main
    id="dataSourcePage"
    class="page ds-page">

    <section
        id="dataSourceCard"
        class="card ds-card">

        <div class="ds-wrap">

            <div class="page-toolbar">

                <div class="page-toolbar-title">
                    データ取り込み
                </div>

                <div
                    class="page-toolbar-main has-source">

                    <div class="toolbar-field">

                        <select
                            id="sourceSelect"
                            class="toolbar-select">

                            <option value="">
                                データ取得元を選択してください
                            </option>

                        </select>

                    </div>

                </div>

                <div class="page-toolbar-actions">

                    <button
                        id="backButton"
                        type="button"
                        class="btn">
                        戻る
                    </button>

                </div>

            </div>

            <div class="main-area">

                <div class="work-panel">

                    <div id="panelEmpty">

                        <div class="section-block">

                            <div class="placeholder">
                                データ取得元を選択してください。
                            </div>

                        </div>

                    </div>

                    <div
                        id="panelKokkai"
                        class="hidden">

                        <h3 class="panel-title">
                            国会議事録取得
                        </h3>

                        <div class="section-block">

                            <div class="compact-actions">

                                <button
                                    id="btnKokkaiRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    国会議事録取得
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelUpload"
                        class="hidden">

                        <h3 class="panel-title">
                            ファイルアップロード
                        </h3>

                        <div class="section-block">

                            <div>

                                <label for="uploadFileInput">
                                    ファイル
                                </label>

                                <div class="upload-file-row">

                                    <input
                                        id="uploadFileInput"
                                        class="upload-file-input"
                                        type="file">

                                    <label
                                        for="uploadFileInput"
                                        class="upload-file-btn">
                                        ファイルの選択
                                    </label>

                                    <div
                                        id="uploadFileName"
                                        class="upload-file-name is-empty">
                                        ファイルが選択されていません
                                    </div>

                                </div>

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnUploadRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    アップロード
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelMail"
                        class="hidden">

                        <h3 class="panel-title">
                            メール取り込み
                        </h3>

                        <div class="section-block">

                            <div>

                                <label for="mailFileInput">
                                    メールファイル
                                </label>

                                <div class="upload-file-row">

                                    <input
                                        id="mailFileInput"
                                        class="upload-file-input"
                                        type="file"
                                        accept=".eml">

                                    <label
                                        for="mailFileInput"
                                        class="upload-file-btn">
                                        メールの選択
                                    </label>

                                    <div
                                        id="mailFileName"
                                        class="upload-file-name is-empty">
                                        メールが選択されていません
                                    </div>

                                </div>

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnMailRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    メール取り込み
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelOpenData"
                        class="hidden">

                        <h3 class="panel-title">
                            公開データ取得
                        </h3>

                        <div class="section-block">

                            <div class="compact-actions">

                                <button
                                    id="btnFetchDatasets"
                                    class="btn btn-primary"
                                    type="button">
                                    データセット取得
                                </button>

                            </div>

                            <div
                                class="
                                    dataset-list-wrap
                                    opendata-list-wrap
                                ">

                                <div
                                    class="
                                        list-header
                                        opendata-header
                                    ">

                                    <div class="opendata-col-title">
                                        タイトル
                                    </div>

                                    <div class="opendata-col-count">
                                        子の数
                                    </div>

                                    <div class="opendata-col-url">
                                        URL
                                    </div>

                                    <div class="opendata-col-status">
                                        状態
                                    </div>

                                    <div class="opendata-col-action">
                                        操作
                                    </div>

                                </div>

                                <div
                                    id="openDataDatasetList"
                                    class="placeholder">
                                    まだ取得していません
                                </div>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelUrl"
                        class="hidden">

                        <h3 class="panel-title">
                            公開URL取得
                        </h3>

                        <div class="section-block">

                            <div class="form-row">

                                <label for="publicUrlTarget">
                                    取得対象URL
                                </label>

                                <input
                                    id="publicUrlTarget"
                                    class="input"
                                    type="url"
                                    placeholder="https://example.com"
                                    autocomplete="off">

                            </div>

                            <div
                                class="
                                    compact-actions
                                    compact-actions-left
                                ">

                                <button
                                    id="btnUrlRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    公開URL取得
                                </button>

                            </div>

                            <h4
                                class="
                                    panel-subtitle
                                    url-list-title
                                ">
                                子URL一覧
                            </h4>

                            <div
                                class="
                                    resource-list-wrap
                                    resource-list-wrap-url
                                ">

                                <div
                                    class="
                                        list-header
                                        url-page-header
                                    ">

                                    <div class="url-col-url">
                                        URL
                                    </div>

                                    <div class="url-col-depth">
                                        階層
                                    </div>

                                    <div class="url-col-score">
                                        評価
                                    </div>

                                    <div class="url-col-status">
                                        状態
                                    </div>

                                    <div class="url-col-action">
                                        操作
                                    </div>

                                </div>

                                <div
                                    id="publicUrlPageList"
                                    class="placeholder">
                                    まだ取得していません
                                </div>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelApi"
                        class="hidden">

                        <h3 class="panel-title">
                            公開API取得
                        </h3>

                        <div class="section-block">

                            <div class="form-row">

                                <label for="publicApiUrl">
                                    API URL
                                </label>

                                <input
                                    id="publicApiUrl"
                                    class="input"
                                    type="url"
                                    placeholder="https://api.example.com/data"
                                    autocomplete="off">

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnApiRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    API取得
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                <div
                    id="logBox"
                    class="log">

                    <div class="log-head">

                        <div>
                            処理ログ
                        </div>

                        <button
                            id="btnClearLog"
                            type="button"
                            class="btn">
                            クリア
                        </button>

                    </div>

                    <pre id="logText"></pre>

                </div>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="./js/data_source.js">
</script>

</body>

</html>
