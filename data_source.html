<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        データ取り込み - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">

    <link
        rel="stylesheet"
        href="./css/data_source.css">
</head>

<body>

<main
    id="dataSourcePage"
    class="page ds-page">

    <section
        id="dataSourceCard"
        class="card ds-card">

        <div class="ds-wrap">

            <div class="page-toolbar">

                <div class="page-toolbar-title">
                    データ取り込み
                </div>

                <div class="page-toolbar-main has-source">

                    <div class="toolbar-field">

                        <select
                            id="sourceTypeSelect"
                            class="toolbar-select">

                            <option value="">
                                データ取得元を選択してください
                            </option>

                            <option value="file">
                                ファイルアップロード
                            </option>

                            <option value="mail">
                                メールファイル
                            </option>

                            <option value="url">
                                公開URL
                            </option>

                            <option value="api">
                                公開API
                            </option>

                        </select>

                    </div>

                </div>

                <div class="page-toolbar-actions">

                    <button
                        id="backButton"
                        type="button"
                        class="btn">
                        戻る
                    </button>

                </div>

            </div>

            <div class="main-area">

                <div class="work-panel">

                    <div id="panelEmpty">

                        <div class="section-block">

                            <div class="placeholder">
                                データ取得元を選択してください。
                            </div>

                        </div>

                    </div>

                    <div
                        id="authenticationArea"
                        class="hidden">

                        <h3 class="panel-title">
                            認証設定
                        </h3>

                        <div class="section-block">

                            <div class="form-row">

                                <label for="authenticationMethodSelect">
                                    認証方式
                                </label>

                                <select
                                    id="authenticationMethodSelect"
                                    class="input">

                                    <option value="">
                                        認証方式を選択してください
                                    </option>

                                </select>

                            </div>

                            <div
                                id="basicAuthenticationFields"
                                class="hidden">

                                <div class="form-grid">

                                    <div class="form-row">

                                        <label for="basicUsername">
                                            ユーザー名
                                        </label>

                                        <input
                                            id="basicUsername"
                                            class="input"
                                            type="text"
                                            maxlength="200"
                                            autocomplete="off">

                                    </div>

                                    <div class="form-row">

                                        <label for="basicPassword">
                                            パスワード
                                        </label>

                                        <input
                                            id="basicPassword"
                                            class="input"
                                            type="password"
                                            maxlength="500"
                                            autocomplete="new-password">

                                    </div>

                                </div>

                            </div>

                            <div
                                id="clientCredentialsFields"
                                class="hidden">

                                <div class="form-grid">

                                    <div class="form-row">

                                        <label for="tokenUrl">
                                            トークンURL
                                        </label>

                                        <input
                                            id="tokenUrl"
                                            class="input"
                                            type="url"
                                            maxlength="1000"
                                            autocomplete="off">

                                    </div>

                                    <div class="form-row">

                                        <label for="clientId">
                                            クライアントID
                                        </label>

                                        <input
                                            id="clientId"
                                            class="input"
                                            type="text"
                                            maxlength="500"
                                            autocomplete="off">

                                    </div>

                                    <div class="form-row">

                                        <label for="clientSecret">
                                            クライアントシークレット
                                        </label>

                                        <input
                                            id="clientSecret"
                                            class="input"
                                            type="password"
                                            maxlength="1000"
                                            autocomplete="new-password">

                                    </div>

                                    <div class="form-row">

                                        <label for="scope">
                                            スコープ
                                        </label>

                                        <input
                                            id="scope"
                                            class="input"
                                            type="text"
                                            maxlength="1000"
                                            autocomplete="off">

                                    </div>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelUpload"
                        class="hidden">

                        <h3 class="panel-title">
                            ファイルアップロード
                        </h3>

                        <div class="section-block">

                            <div>

                                <label for="uploadFileInput">
                                    ファイル
                                </label>

                                <div class="upload-file-row">

                                    <input
                                        id="uploadFileInput"
                                        class="upload-file-input"
                                        type="file">

                                    <label
                                        for="uploadFileInput"
                                        class="upload-file-btn">
                                        ファイルの選択
                                    </label>

                                    <div
                                        id="uploadFileName"
                                        class="upload-file-name is-empty">
                                        ファイルが選択されていません
                                    </div>

                                </div>

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnUploadRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    アップロード
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelMail"
                        class="hidden">

                        <h3 class="panel-title">
                            メールファイル取り込み
                        </h3>

                        <div class="section-block">

                            <div>

                                <label for="mailFileInput">
                                    メールファイル
                                </label>

                                <div class="upload-file-row">

                                    <input
                                        id="mailFileInput"
                                        class="upload-file-input"
                                        type="file"
                                        accept=".eml">

                                    <label
                                        for="mailFileInput"
                                        class="upload-file-btn">
                                        メールの選択
                                    </label>

                                    <div
                                        id="mailFileName"
                                        class="upload-file-name is-empty">
                                        メールが選択されていません
                                    </div>

                                </div>

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnMailRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    メール取り込み
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelUrl"
                        class="hidden">

                        <h3 class="panel-title">
                            公開URL取得
                        </h3>

                        <div class="section-block">

                            <div class="form-row">

                                <label for="publicUrl">
                                    取得対象URL
                                </label>

                                <input
                                    id="publicUrl"
                                    class="input"
                                    type="url"
                                    maxlength="2000"
                                    placeholder="https://example.com"
                                    autocomplete="off">

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnUrlRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    公開URL取得
                                </button>

                            </div>

                        </div>

                    </div>

                    <div
                        id="panelApi"
                        class="hidden">

                        <h3 class="panel-title">
                            公開API取得
                        </h3>

                        <div class="section-block">

                            <div class="form-row">

                                <label for="apiUrl">
                                    API URL
                                </label>

                                <input
                                    id="apiUrl"
                                    class="input"
                                    type="url"
                                    maxlength="2000"
                                    placeholder="https://api.example.com/data"
                                    autocomplete="off">

                            </div>

                            <div class="form-row">

                                <label for="httpMethod">
                                    HTTPメソッド
                                </label>

                                <select
                                    id="httpMethod"
                                    class="input">

                                    <option value="GET">
                                        GET
                                    </option>

                                    <option value="POST">
                                        POST
                                    </option>

                                </select>

                            </div>

                            <div class="form-row">

                                <label for="requestParameters">
                                    検索条件・リクエストパラメータ
                                </label>

                                <textarea
                                    id="requestParameters"
                                    class="input"
                                    rows="6"
                                    placeholder='{"keyword":"生成AI"}'></textarea>

                            </div>

                            <div class="compact-actions">

                                <button
                                    id="btnApiRegister"
                                    class="btn btn-primary"
                                    type="button">
                                    API取得
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

                <div
                    id="logBox"
                    class="log">

                    <div class="log-head">

                        <div>
                            処理ログ
                        </div>

                        <button
                            id="btnClearLog"
                            type="button"
                            class="btn">
                            クリア
                        </button>

                    </div>

                    <pre id="logText"></pre>

                </div>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="./js/data_source.js">
</script>

</body>

</html>
