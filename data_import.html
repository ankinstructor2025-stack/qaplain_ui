<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>データ取込</title>

  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/data_import.css">
  <link rel="stylesheet" href="./css/data_import_file.css">
  <link rel="stylesheet" href="./css/data_import_none.css">
</head>

<body>

<div id="dataImportPage" class="page ds-page">
  <div id="dataImportCard" class="card ds-card">
    <div class="ds-wrap">

      <div id="pageToolbar"></div>

      <div class="main-area">

        <div class="work-panel">

          <div id="panelEmpty">
            <div class="section-block">
              <div class="placeholder">
                データソースを選択してください。
              </div>
            </div>
          </div>

          <div id="panelUpload" class="hidden">
            <h3 class="panel-title">
              ファイル取込
            </h3>

            <div class="section-block">

              <div>
                <label for="uploadFileInput">
                  ファイル
                </label>

                <div class="upload-file-row">

                  <input
                    id="uploadFileInput"
                    class="upload-file-input"
                    type="file"
                  >

                  <label
                    for="uploadFileInput"
                    class="upload-file-btn"
                  >
                    ファイルの選択
                  </label>

                  <div
                    id="uploadFileName"
                    class="upload-file-name is-empty"
                  >
                    ファイルが選択されていません
                  </div>

                </div>
              </div>

              <div class="compact-actions">
                <button
                  id="btnUploadRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>

            <div class="uploaded-file-section">

              <h3 class="uploaded-file-title">
                アップロード済みファイル
              </h3>

              <div class="uploaded-file-header">
                <div class="uploaded-file-name">
                  ファイル名
                </div>

                <div class="uploaded-file-extension">
                  拡張子
                </div>

                <div class="uploaded-file-size">
                  サイズ
                </div>

                <div class="uploaded-file-date">
                  登録・更新日時
                </div>

                <div class="uploaded-file-status">
                  状態
                </div>
              </div>

              <div id="uploadedFileList">
                <div class="uploaded-file-message">
                  読み込み中...
                </div>
              </div>

            </div>

          </div>

          <div id="panelUrl" class="hidden">
            <h3 class="panel-title">
              URLデータ取込
            </h3>

            <div class="section-block">

              <div class="placeholder">
                選択したデータソースのURL、認証方式、パラメータを使用してデータを取り込みます。
              </div>

              <div class="compact-actions">
                <button
                  id="btnUrlRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>
          </div>

          <div id="panelApi" class="hidden">
            <h3 class="panel-title">
              API・メールデータ取込
            </h3>

            <div class="section-block">

              <div class="placeholder">
                選択したデータソースの接続先、認証方式、パラメータを使用してデータを取り込みます。
              </div>

              <div class="compact-actions">
                <button
                  id="btnApiRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>

            <div
              id="apiImportResult"
              class="api-import-result hidden"
            >
              <h3 class="api-import-result-title">
                取得結果
              </h3>

              <div class="api-import-result-summary">
                <div>
                  <span class="api-import-result-label">
                    取得先
                  </span>
                  <span id="apiResultUrl"></span>
                </div>

                <div>
                  <span class="api-import-result-label">
                    種類
                  </span>
                  <span id="apiResultContentType"></span>
                </div>

                <div>
                  <span class="api-import-result-label">
                    サイズ
                  </span>
                  <span id="apiResultSize"></span>
                </div>

                <div>
                  <span class="api-import-result-label">
                    保存先
                  </span>
                  <span id="apiResultStoragePath"></span>
                </div>
              </div>

              <pre
                id="apiResultPreview"
                class="api-import-result-preview"
              ></pre>
            </div>

          </div>

        </div>

        <div class="log" id="logBox">
          <pre id="logText"></pre>
        </div>

      </div>

    </div>
  </div>
</div>


<script src="./js/data_import_file_upload.js"></script>
<script src="./js/data_import_none.js"></script>
<script src="./js/data_import_basic.js"></script>
<script src="./js/data_import_client_credentials.js"></script>

<script
  type="module"
  src="./js/data_import.js"
></script>

</body>
</html>
