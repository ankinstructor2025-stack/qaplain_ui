<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>データ取込</title>

  <link rel="stylesheet" href="./css/theme.css">
  <link rel="stylesheet" href="./css/data_import.css">
</head>

<body>

<div id="dataImportPage" class="page ds-page">
  <div id="dataImportCard" class="card ds-card">
    <div class="ds-wrap">

      <div id="pageToolbar"></div>

      <div class="main-area">

        <div class="work-panel">

          <div id="panelEmpty">
            <div class="section-block">
              <div class="placeholder">
                データソースを選択してください。
              </div>
            </div>
          </div>

          <div id="panelUpload" class="hidden">
            <h3 class="panel-title">
              ファイル取込
            </h3>

            <div class="section-block">

              <div>
                <label for="uploadFileInput">
                  ファイル
                </label>

                <div class="upload-file-row">

                  <input
                    id="uploadFileInput"
                    class="upload-file-input"
                    type="file"
                  >

                  <label
                    for="uploadFileInput"
                    class="upload-file-btn"
                  >
                    ファイルの選択
                  </label>

                  <div
                    id="uploadFileName"
                    class="upload-file-name is-empty"
                  >
                    ファイルが選択されていません
                  </div>

                </div>
              </div>

              <div class="compact-actions">
                <button
                  id="btnUploadRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>
          </div>

          <div id="panelUrl" class="hidden">
            <h3 class="panel-title">
              URLデータ取込
            </h3>

            <div class="section-block">

              <div class="placeholder">
                選択したデータソースのURL、認証方式、パラメータを使用してデータを取り込みます。
              </div>

              <div class="compact-actions">
                <button
                  id="btnUrlRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>
          </div>

          <div id="panelApi" class="hidden">
            <h3 class="panel-title">
              API・メールデータ取込
            </h3>

            <div class="section-block">

              <div class="placeholder">
                選択したデータソースの接続先、認証方式、パラメータを使用してデータを取り込みます。
              </div>

              <div class="compact-actions">
                <button
                  id="btnApiRegister"
                  class="btn btn-primary"
                  type="button"
                >
                  取込
                </button>
              </div>

            </div>
          </div>

        </div>

        <div class="log" id="logBox">
          <pre id="logText"></pre>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="./js/common_toolbar.js"></script>

<script src="./js/data_import_file.js"></script>
<script src="./js/data_import_none.js"></script>
<script src="./js/data_import_basic.js"></script>
<script src="./js/data_import_client_credentials.js"></script>

<script src="./js/data_import.js"></script>

<script>
  renderPageToolbar({
    mountId: "pageToolbar",
    title: "データ取込",
    showSourceSelect: true,
    showDbSelect: false,
    enableDbAutoLoad: false,
    actions: [
      {
        id: "btnMenu",
        label: "メニュー"
      },
      {
        id: "btnLogout",
        label: "ログアウト"
      }
    ]
  });
</script>

</body>
</html>
