<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        拡張子編集 - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">
</head>

<body>

<main class="page">

    <div class="page-toolbar">

        <div class="page-toolbar-title">
            拡張子編集
        </div>

        <div class="page-toolbar-main">
        </div>

        <div class="page-toolbar-actions">

            <button
                id="saveButton"
                type="button"
                class="btn btn-primary">
                保存
            </button>

            <button
                id="backButton"
                type="button"
                class="btn">
                戻る
            </button>

        </div>

    </div>

    <section class="card">

        <div class="form-grid">

            <div class="date-row">

                <div class="date-item">

                    <label for="extension">
                        拡張子
                    </label>

                    <input
                        id="extension"
                        class="input"
                        type="text"
                        maxlength="20"
                        placeholder="pdf"
                        autocomplete="off"
                        spellcheck="false">

                </div>

                <div class="date-item">

                    <label for="displayName">
                        表示名
                    </label>

                    <input
                        id="displayName"
                        class="input"
                        type="text"
                        maxlength="100"
                        placeholder="PDF"
                        autocomplete="off">

                </div>

            </div>

            <div class="form-row">

                <label for="mimeTypes">
                    MIMEタイプ
                </label>

                <textarea
                    id="mimeTypes"
                    class="input"
                    rows="4"
                    placeholder="application/pdf"></textarea>

            </div>

            <div class="date-row">

                <div class="date-item">

                    <label for="parserType">
                        解析方式
                    </label>

                    <input
                        id="parserType"
                        class="input"
                        type="text"
                        maxlength="50"
                        placeholder="pdf"
                        autocomplete="off">

                </div>

                <div class="date-item">

                    <label for="maxFileSizeMb">
                        最大ファイルサイズ（MB）
                    </label>

                    <input
                        id="maxFileSizeMb"
                        class="input"
                        type="number"
                        min="1"
                        max="10000"
                        value="50">

                </div>

            </div>

            <div class="date-row">

                <div class="date-item">

                    <label for="enabled">
                        状態
                    </label>

                    <select
                        id="enabled"
                        class="input">

                        <option value="true">
                            有効
                        </option>

                        <option value="false">
                            無効
                        </option>

                    </select>

                </div>

                <div class="date-item">

                    <label for="sortOrder">
                        表示順
                    </label>

                    <input
                        id="sortOrder"
                        class="input"
                        type="number"
                        min="0"
                        max="9999"
                        value="10">

                </div>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="./js/file_type_edit.js">
</script>

</body>

</html>
