<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        拡張子編集 - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">
</head>

<body>

<main class="page">

    <div class="page-toolbar">

        <div class="page-toolbar-title">
            拡張子編集
        </div>

        <div class="page-toolbar-main">
        </div>

        <div class="page-toolbar-actions">

            <button
                id="saveButton"
                type="button"
                class="btn btn-primary">
                保存
            </button>

            <button
                id="backButton"
                type="button"
                class="btn">
                戻る
            </button>

        </div>

    </div>

    <section class="card">

        <div class="form-grid">

            <div class="form-row">

                <label for="extension">
                    拡張子
                </label>

                <input
                    id="extension"
                    class="input"
                    type="text"
                    list="extensionOptions"
                    maxlength="20"
                    placeholder="候補から選択、または直接入力"
                    autocomplete="off"
                    spellcheck="false">

                <datalist id="extensionOptions">

                    <option value="pdf">
                    <option value="csv">
                    <option value="txt">
                    <option value="md">
                    <option value="json">
                    <option value="xml">
                    <option value="docx">
                    <option value="xlsx">
                    <option value="pptx">
                    <option value="eml">

                </datalist>

            </div>

            <div class="form-row">

                <label for="enabled">
                    状態
                </label>

                <select
                    id="enabled"
                    class="input">

                    <option value="true">
                        有効
                    </option>

                    <option value="false">
                        無効
                    </option>

                </select>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="./js/file_type_edit.js">
</script>

</body>

</html>
