<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        テナント編集 - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">
</head>

<body>

<main class="page">

    <div class="page-toolbar">

        <div class="page-toolbar-title">
            テナント編集
        </div>

        <div class="page-toolbar-main">
        </div>

        <div class="page-toolbar-actions">

            <button
                id="saveButton"
                type="button"
                class="btn btn-primary">
                保存
            </button>

            <button
                id="backButton"
                type="button"
                class="btn">
                戻る
            </button>

        </div>

    </div>

    <section class="card">

        <div class="form-grid">

            <div class="form-row">

                <label for="tenantName">
                    テナント名
                </label>

                <input
                    id="tenantName"
                    class="input"
                    type="text"
                    maxlength="100"
                    autocomplete="off">

            </div>

            <div class="form-row">

                <label for="parentUser">
                    管理者
                </label>

                <input
                    id="parentUser"
                    class="input"
                    type="text"
                    readonly>

            </div>

            <div class="date-row">

                <div class="date-item">

                    <label for="startDate">
                        利用開始日
                    </label>

                    <input
                        id="startDate"
                        class="input"
                        type="date">

                </div>

                <div class="date-item">

                    <label for="endDate">
                        利用終了日
                    </label>

                    <input
                        id="endDate"
                        class="input"
                        type="date">

                </div>

            </div>


            <div class="form-row">

                <label for="taskConcurrency">
                    TASKS並列数
                </label>

                <input
                    id="taskConcurrency"
                    class="input"
                    type="number"
                    min="1"
                    max="10"
                    step="1"
                    value="1">

            </div>


            <div class="form-row">

                <label for="taskMaxAttempts">
                    TASKS最大リトライ回数
                </label>

                <input
                    id="taskMaxAttempts"
                    class="input"
                    type="number"
                    min="1"
                    max="100"
                    step="1"
                    value="5">

            </div>

            <div class="form-row">

                <label for="openaiApiKey">
                    OpenAI APIキー
                </label>

                <div
                    style="
                        display:flex;
                        gap:8px;
                        align-items:center;
                    ">

                    <input
                        id="openaiApiKey"
                        class="input"
                        type="password"
                        autocomplete="new-password"
                        spellcheck="false"
                        style="flex:1;">

                    <button
                        id="toggleOpenaiApiKeyButton"
                        type="button"
                        class="btn">
                        表示
                    </button>

                </div>

            </div>

            <div class="form-row">

                <label for="geminiApiKey">
                    Gemini APIキー
                </label>

                <div
                    style="
                        display:flex;
                        gap:8px;
                        align-items:center;
                    ">

                    <input
                        id="geminiApiKey"
                        class="input"
                        type="password"
                        autocomplete="new-password"
                        spellcheck="false"
                        style="flex:1;">

                    <button
                        id="toggleGeminiApiKeyButton"
                        type="button"
                        class="btn">
                        表示
                    </button>

                </div>

            </div>

        </div>

    </section>

</main>

<script
    type="module"
    src="./js/tenant_edit.js">
</script>

</body>

</html>
