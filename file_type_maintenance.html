<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        拡張子管理 - QA+Plain Knowledge Studio
    </title>

    <link
        rel="stylesheet"
        href="./css/theme.css">
</head>

<body>

<main class="page">

    <div class="page-toolbar">

        <div class="page-toolbar-title">
            拡張子管理
        </div>

        <div class="page-toolbar-main">
        </div>

        <div class="page-toolbar-actions">

            <button
                id="addFileTypeButton"
                type="button"
                class="btn btn-primary">
                新規登録
            </button>

            <button
                id="backButton"
                type="button"
                class="btn">
                戻る
            </button>

        </div>

    </div>

    <section class="card">

        <div class="list-header">

            <div style="width:40%;">
                拡張子
            </div>

            <div style="width:30%;">
                状態
            </div>

            <div style="width:30%;">
                操作
            </div>

        </div>

        <div id="fileTypeList">
        </div>

    </section>

</main>

<script
    type="module"
    src="./js/file_type_maintenance.js">
</script>

</body>

</html>
